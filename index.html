<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>منطقة الألعاب</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#111;
      color:white;
      text-align:center;
    }

    header{
      background:#6a00ff;
      padding:20px;
      font-size:30px;
      font-weight:bold;
    }

    .games{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:20px;
      padding:30px;
    }

    .card{
      background:#222;
      width:250px;
      border-radius:15px;
      overflow:hidden;
      box-shadow:0 0 10px rgba(0,0,0,0.5);
    }

    .card img{
      width:100%;
      height:150px;
      object-fit:cover;
    }

    .card h2{
      margin:15px 0;
    }

    .btn{
      display:inline-block;
      margin-bottom:20px;
      padding:10px 20px;
      background:#6a00ff;
      color:white;
      text-decoration:none;
      border-radius:10px;
    }

    footer{
      margin-top:30px;
      padding:15px;
      background:#1a1a1a;
    }
  </style>
</head>

<body>

<header>
🎮 منطقة الألعاب
</header>

<div class="games">

  <div class="card">
    <img src="https://picsum.photos/300/200?1">
    <h2>لعبة السيارات</h2>
    <a class="btn" href="#">العب الآن</a>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?2">
    <h2>لعبة القتال</h2>
    <a class="btn" href="#">العب الآن</a>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300/200?3">
    <h2>لعبة المغامرات</h2>
    <a class="btn" href="#">العب الآن</a>
  </div>

</div>

<footer>
جميع الحقوق محفوظة © 2026
</footer>

</body>
  </html>
